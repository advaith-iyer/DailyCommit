name: Daily Commit Workflow

on:
  schedule:
    - cron: '15 21 * * *'   # runs every day at 21:15 UTC
  workflow_dispatch:        # allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step with email 25f1002024@ds.study.iitm.ac.in
        run: echo "Using email 25f1002024@ds.study.iitm.ac.in"

      - name: Make daily commit
        run: |
          echo "Last run: $(date)" >> daily-log.txt
          git config --global user.name "github-actions"
          git config --global user.email "25f1002024@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit on $(date)" || echo "No changes to commit"
          git push
