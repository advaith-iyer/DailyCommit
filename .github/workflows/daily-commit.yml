name: Daily Commit Workflow

on:
  workflow_dispatch:
  schedule:
    - cron: '15 21 * * *'

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Step with email 25f1002024@ds.study.iitm.ac.in
        run: echo "Using email 25f1002024@ds.study.iitm.ac.in"

      - name: Make daily commit
        run: |
          echo "Run on $(date)" >> daily-log.txt
          git config user.name "github-actions"
          git config user.email "25f1002024@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit"
          git push
